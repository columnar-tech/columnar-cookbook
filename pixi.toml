[workspace]
name = "columnar-cookbook"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[tasks]
build = "python -m scripts.build"
serve = "python -m scripts.serve"
dev = "python -m scripts.watch"
watch = "python -m scripts.watch"
format = "ruff format"
lint = "ruff check --fix"
check-types = "ty check scripts"
validate = "python -m scripts.validate"

[dependencies]
nbconvert = ">=7.17.0,<8"
ipykernel = ">=7.1.0,<8"
ruff = ">=0.15.0,<0.16"
jinja2 = ">=3.1.6,<4"
pip = ">=26.0.1,<27"
ty = ">=0.0.18,<0.0.19"
pydantic = ">=2.12.5,<3"
pillow = ">=12.1.1,<13"
livereload = ">=2.7.1,<3"
