[workspace]
name = "columnar-cookbook"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[tasks]
build = "python scripts/build.py"
serve = "python -m http.server -d build"
format = "ruff format"
lint = "ruff check --fix"
check-types = "ty check"
validate = "python scripts/validate.py"

[dependencies]
nbconvert = ">=7.17.0,<8"
ipykernel = ">=7.1.0,<8"
ruff = ">=0.15.0,<0.16"
jinja2 = ">=3.1.6,<4"
pip = ">=26.0.1,<27"
ty = ">=0.0.18,<0.0.19"
pydantic = ">=2.12.5,<3"
